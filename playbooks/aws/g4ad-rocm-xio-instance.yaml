#
# SPDX-License-Identifier: Apache-2.0
#
# AWS CLI template for launching a G4ad instance suitable for ROCm XIO setup.
#
# Usage:
# aws ec2 run-instances \
#   --cli-input-yaml file://playbooks/aws/g4ad-rocm-xio-instance.yaml
#
# Fill the placeholder values below before use.
#
ImageId: ami-REPLACE_WITH_UBUNTU_NOBLE_AMI
InstanceType: g4ad.xlarge
MinCount: 1
MaxCount: 1
KeyName: REPLACE_WITH_KEYPAIR_NAME
SecurityGroupIds:
  - sg-REPLACE_WITH_SSH_SECURITY_GROUP
SubnetId: subnet-REPLACE_WITH_SUBNET_ID
IamInstanceProfile:
  Name: REPLACE_WITH_OPTIONAL_INSTANCE_PROFILE
BlockDeviceMappings:
  - DeviceName: /dev/sda1
    Ebs:
      VolumeSize: 200
      VolumeType: gp3
      DeleteOnTermination: true
      Encrypted: true
TagSpecifications:
  - ResourceType: instance
    Tags:
      - Key: Name
        Value: rocm-xio-g4ad
      - Key: Project
        Value: rocm-xio
      - Key: Owner
        Value: REPLACE_WITH_OWNER
MetadataOptions:
  HttpTokens: required
  HttpEndpoint: enabled
Monitoring:
  Enabled: false
