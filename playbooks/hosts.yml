all:
  vars:
    root_user: ubuntu
    username: ""
    # Track latest upstream sources for lab playbook runs. Role defaults remain
    # pinned for collection users unless inventory overrides these versions.
    rocm_hipfile_setup_hipfile_version: main
    rocm_hipfile_setup_fio_version: main
    rocm_xio_setup_repo_version: main

  children:

    local:
      hosts:
        localhost:
          ansible_connection: local

    aws_ec2_launch:
      hosts:
        localhost:
          ansible_connection: local
      vars:
        # EC2 launch defaults. Tune these in a local vars file or with `-e`.
        aws_rocm_skip_ec2_launch: false
        aws_ec2_vpc_subnet_id: ""
        aws_ec2_key_name: ""
        aws_ec2_security_group_ids: []
        aws_ec2_iam_instance_profile_name: ""
        aws_ec2_profile: ""
        aws_ec2_region: us-west-2
        aws_ec2_instance_type: g4ad.xlarge
        aws_ec2_root_volume_size: 200
        aws_ec2_root_volume_type: gp3
        aws_ec2_assign_public_ip: true
        aws_ec2_ami_id: ""
        aws_ec2_instance_name: aws-rocm-xio
        aws_ec2_project_tag: rocm-xio
        aws_ec2_owner_tag: ""
        aws_ec2_inventory_host_name: aws-rocm-xio-target
        aws_ec2_ssh_user: ubuntu
        aws_ec2_root_user: ubuntu
        aws_ec2_bootstrap_ansible_host: ""
        aws_ec2_ssh_private_key_file: ""
    aws_rocm_bootstrap:
      hosts:
        aws-rocm-xio-target:
          ansible_user: ubuntu
      vars:
        # Bootstrap host connection and ROCm/XIO defaults.
        ansible_host: >-
          {{ aws_ec2_bootstrap_ansible_host if (aws_ec2_bootstrap_ansible_host | default('', true) | length > 0) else omit }}
        ansible_ssh_private_key_file: >-
          {{ aws_ec2_ssh_private_key_file if (aws_ec2_ssh_private_key_file | default('', true) | length > 0) else omit }}
        rocm_setup_skip_reboot: false
        rocm_setup_install_kernel_driver: true
        rocm_setup_extra_kernel_packages:
          - linux-modules-extra-aws
        expected_gpu_count: 1
        expected_nvme_count: 1
        rocm_xio_setup_perf_endpoint: nvme-ep
        rocm_xio_setup_gpu_count: 1
        rocm_xio_setup_perf_nvme_controllers:
          - /dev/nvme1n1
    awsmachines:
      hosts:
        aws-rocm-xio-target:
          ansible_user: ubuntu

    localvms:
      hosts:
        local-vm:
          username: stebates
          user_setup_vm_fstab: true
          user_setup_motd: true
    amd:
      hosts:
        amd-laptop:
          ansible_host: 10.0.0.107
          ansible_user: stebates
          username: stebates
          rocm_setup_wsl: rocdxg
          rocm_setup_run_checks: true
          rocm_setup_wsl_run_hip_check: true
          rocm_setup_install_metrics_exporter: true
        amd-aic-vast:
          ansible_host: amd-aic-vast
        amd-oracle:
          ansible_host: amd-oracle
          user_setup_create: false
          ansible_ssh_common_args: >-
            -o RequestTTY=no
            -o RemoteCommand=none
        weka-client:
          ansible_host: weka-client
          username: stebates
        weka-server:
          ansible_host: weka-server
          username: stebates
        hipfile-9:
        hipfile-10:
        ibgda-ctrl:
        snoc-strix:
          username: batesste
          user_setup_motd: true
          rdma_setup_install_rdma_exporter: true
          rdma_setup_motd: true
          nvme_exporter_setup_install: true
        snoc-think:
          user_setup_motd: true
        snoc-think-vm:
          ansible_host: 10.0.0.131
          ansible_ssh_host: 2222
          user_setup_vm_fstab: true
          user_setup_motd: true
        ibgda-brcm:
        local-vm:
          user_setup_vm_fstab: true
          user_setup_motd: true
          rdma_setup_install_rdma_exporter: true
          rdma_setup_motd: true
          nvme_exporter_setup_install: true
        rocm-ernic-vm:
          ansible_host: rocm-ernic
          ansible_ssh_port: 2222
          user_setup_vm_fstab: true
          user_setup_motd: true
          rocm_setup_user: stebates
          rocm_setup_run_checks: true
          rdma_setup_install_rdma_exporter: true
          rdma_setup_motd: true
          nvme_exporter_setup_install: true
          uprof_setup_deb_path: /var/lib/amduprof/amduprof_5.3-518_amd64.deb
          # Forwarded exporter ports (QEMU hostfwd on host rocm-ernic)
          #node_exporter_port: 9100
          #nvme_exporter_port: 9998
        rocm-ernic-vm-alola:
          ansible_host: 10.7.197.12
          user_setup_vm_fstab: true
          user_setup_motd: true
          ansible_user: stebates
        hipfile-9-vm:
          ansible_host: hipfile-9
          ansible_ssh_port: 2222
          user_setup_vm_fstab: true
          user_setup_motd: true
      vars:
        username: stebates
        user_setup_create: false

    pliops:
      hosts:
        pliops-storage:
        pliops-gpu:
          ansible_user: amd

    nvmeof:
      hosts:
        nvmeof-hosts:
          nvmeof_setup_mode: host
          ansible_host: snoc-think
          nvmeof_setup_target_host: 192.168.2.1
          nvmeof_setup_connections:
            - transport: rdma
              trsvcid: 4420
              nqn: nvmet-storage
        nvmeof_targets:
          ansible_host: snoc-think-vm
          nvmeof_setup_mode: target
          nvmeof_setup_rdma_dhcp_enable: false
          nvmeof_setup_rdma_dhcp_subnet: "192.168.2.0/24"
          nvmeof_setup_rdma_dhcp_range: "192.168.2.10,192.168.2.50"
          nvmeof_setup_rdma_dhcp_target_ip: "192.168.2.1"
          nvmeof_setup_rdma_dhcp_lease: "1h"
          nvmeof_setup_target_interface: enp1s0np1
          nvmeof_setup_subsystems:
            - name: nvmet-storage
              allow_any_host: true
              namespaces:
                - nsid: 1
                  device_path: /dev/nvme0n1
                  enable: true
                - nsid: 2
                  device_path: /dev/nvme1n1
                  enable: true
                - nsid: 3
                  device_path: /dev/nvme2n1
                  enable: true
                - nsid: 4
                  device_path: /dev/nvme3n1
                  enable: true
                - nsid: 5
                  device_path: /dev/nvme4n1
                  enable: true
                - nsid: 6
                  device_path: /dev/nvme4n1
                  enable: true
                - nsid: 7
                  device_path: /dev/nvme6n1
                  enable: true
                - nsid: 8
                  device_path: /dev/nvme7n1
                  enable: true
          nvmeof_setup_ports:
            - port_id: 1
              trtype: rdma
              adrfam: ipv4
              trsvcid: 4420
              subsystems:
                - nvmet-storage
      vars:
        username: stebates

    weka_oci:
      hosts:
        weka-server-vm-10:
          ansible_host: useocpm2m-097-114
          ansible_port: 2230
          ansible_ssh_common_args: '-o ProxyJump=useocpslog-002'
      vars:
        username: stebates
        user_setup_vm_fstab: true
        user_setup_motd: true
        rocm_setup_user: stebates
        rocm_setup_run_checks: false
        rdma_setup_install_rdma_exporter: true
        rdma_setup_motd: true

    weka_local:
      hosts:
        weka-server-vm-1:
          ansible_host: snoc-think
          ansible_port: 2230
        weka-server-vm-2:
          ansible_host: snoc-think
          ansible_port: 2231
      vars:
        username: stebates
        user_setup_vm_fstab: true
        user_setup_motd: true
        rocm_setup_user: stebates
        rocm_setup_run_checks: false
        rdma_setup_install_rdma_exporter: true
        rdma_setup_motd: true
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

    rdma:
      hosts:
        snoc-think:
          ansible_host: snoc-think
        snoc-think-vm:
          ansible_host: snoc-think-vm
      vars:
        rdma_setup_install_rdma_exporter: true
        rdma_setup_motd: true

    pensando:
      hosts:
        pensando-01:
          ansible_host: pens-01
          ansible_user: stebates
          user_setup_vm_fstab: false
      vars:
        username: stebates
        user_setup_motd: true
