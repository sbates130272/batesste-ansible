- name: Setup user account and install cool stuff on a new AMD machine
  hosts: "{{ targets }}"
  gather_facts: true
  roles:
    - role: sbates130272.batesste.user_setup
      remote_user: "{{ username }}"
      tags: [user_setup]
    - role: sbates130272.batesste.fave_packages
      remote_user: "{{ username }}"
      tags: [fave_packages]
    - role: sbates130272.batesste.git_setup
      remote_user: "{{ username }}"
      tags: [git_setup]
    - role: sbates130272.batesste.rdma_setup
      remote_user: "{{ username }}"
      rocm_setup_user: "{{ username }}"
      tags: [rdma_setup]
    - role: sbates130272.batesste.rocm_setup
      remote_user: "{{ username }}"
      rocm_setup_user: "{{ username }}"
      tags: [rocm_setup]
    - role: sbates130272.batesste.uprof_setup
      remote_user: "{{ username }}"
      tags: [uprof_setup]
