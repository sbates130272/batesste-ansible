# Copyright (c) Stephen Bates, 2026
#
# Unified playbooks: pick a recipe with --tags recipe_<name>. Role-level tags
# still apply (e.g. --tags recipe_amd,rocm_setup). Examples:
#   ansible-playbook setup.yml -i hosts.yml -e targets=localvms --tags recipe_newmachine
#   ansible-playbook setup.yml -i hosts.yml -e targets=amd --tags recipe_amd
#   ansible-playbook setup.yml -i hosts.yml --tags recipe_aws_rocm_xio
#
# Recipes: recipe_newmachine, recipe_amd, recipe_nfs_rdma, recipe_nvmeof,
# recipe_rocm_xio, recipe_aws_ec2_setup, recipe_aws_rocm_xio
#
# Without --tags, Ansible runs every play (usually not what you want).

# --- recipe_newmachine -------------------------------------------------------

- name: Setup user account and install cool stuff on a new machine
  hosts: "{{ targets }}"
  gather_facts: true
  tags: [recipe_newmachine]
  vars:
    force: false
    kernel_setup_force: "{{ force }}"
    kernel_setup_tools_force: "{{ force }}"
    qemu_setup_force: "{{ force }}"
    tmux_scripts_force: "{{ force }}"
    fio_devel_fio_force: "{{ force }}"
    fio_devel_fio_stuff_force: "{{ force }}"
  roles:
    - role: sbates130272.batesste.user_setup
      remote_user: "{{ root_user }}"
      tags: [user_setup]
    - role: sbates130272.batesste.fave_packages
      remote_user: "{{ username }}"
      tags: [fave_packages]
    - role: sbates130272.batesste.nvme_exporter_setup
      remote_user: "{{ username }}"
      tags: [nvme_exporter_setup]
    - role: sbates130272.batesste.git_setup
      remote_user: "{{ username }}"
      tags: [git_setup]
    - role: sbates130272.batesste.tmux_scripts
      remote_user: "{{ username }}"
      tags: [tmux_scripts]
    - role: sbates130272.batesste.cloud_setup
      remote_user: "{{ username }}"
      tags: [cloud_setup]
      when:
        - ansible_facts['distribution'] == "Ubuntu"
        - ansible_facts['distribution_release'] in ['noble', 'resolute']
    - role: sbates130272.batesste.consul_setup
      remote_user: "{{ username }}"
      tags: [consul_setup]
      when:
        - ansible_facts['distribution'] == "Ubuntu"
        - ansible_facts['distribution_release'] in ['noble', 'resolute']
    - role: sbates130272.batesste.mutt_setup
      remote_user: "{{ username }}"
      tags: [mutt_setup]
    - role: sbates130272.batesste.kernel_setup
      remote_user: "{{ username }}"
      tags: [kernel_setup]
    - role: sbates130272.batesste.fio_devel
      remote_user: "{{ username }}"
      tags: [fio_devel]
    - role: sbates130272.batesste.docker_setup
      docker_setup_users:
        - "{{ username }}"
      become: true
      tags: [docker_setup]
    - role: sbates130272.batesste.aws_grub
      remote_user: "{{ username }}"
      tags: [aws_grub]
      when:
        - inventory_hostname in groups['awsmachines']
    - role: sbates130272.batesste.qemu_setup
      remote_user: "{{ username }}"
      tags: [qemu_setup]
      when:
        - inventory_hostname not in groups['localvms'] and
          inventory_hostname not in groups['runners']
    - role: sbates130272.batesste.vm_create
      remote_user: "{{ username }}"
      tags: [vm_create]
      when:
        - inventory_hostname not in groups['localvms'] and
          inventory_hostname not in groups['runners']

