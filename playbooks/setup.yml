# Select recipes with `-e setup_recipe=<name>`. Use `--tags <role_tag>` only to
# narrow work inside the chosen recipe.

- name: Configure hosts with the selected setup recipe
  hosts: "{{ targets }}"
  gather_facts: true
  vars:
    setup_recipe_name: "{{ setup_recipe | default(recipe | default('newmachine')) }}"
    setup_recipes:
      newmachine:
        - user_setup
        - fave_packages
        - nvme_exporter_setup
        - git_setup
        - tmux_scripts
        - cloud_setup
        - consul_setup
        - mutt_setup
        - kernel_setup
        - fio_devel
        - docker_setup
        - qemu_setup
        - vm_create
      amd:
        - user_setup
        - fave_packages
        - nvme_exporter_setup
        - git_setup
        - rdma_setup
        - rocm_setup
        - rocm_hipfile_setup
        - rocm_xio_setup
        - uprof_setup
      nfs_rdma:
        - nfs_rdma_setup
      nvmeof:
        - nvmeof_setup
      rocm_xio:
        - rocm_xio_setup
    setup_selected_roles: >-
      {{
        (setup_roles.split(',') if setup_roles is string else setup_roles)
        if setup_roles is defined else setup_recipes[setup_recipe_name]
      }}
    setup_user_setup_remote_user_effective: >-
      {{ setup_user_setup_remote_user | default(root_user
         if setup_recipe_name == 'newmachine' else username) }}
    force: false
    kernel_setup_force: "{{ force }}"
    kernel_setup_tools_force: "{{ force }}"
    qemu_setup_force: "{{ force }}"
    tmux_scripts_force: "{{ force }}"
    fio_devel_fio_force: "{{ force }}"
    fio_devel_fio_stuff_force: "{{ force }}"
  pre_tasks:
    - name: Confirm setup recipe is known
      ansible.builtin.assert:
        that:
          - setup_recipe_name in setup_recipes
        fail_msg: >-
          Unknown setup_recipe '{{ setup_recipe_name }}'. Choose one of {{
          setup_recipes.keys() | list | join(', ') }}.
      tags:
        - always

    - name: Confirm username is set for role remote_user
      ansible.builtin.assert:
        that:
          - username | default('', true) | length > 0
        fail_msg: >-
          Define username (account to configure) in hosts.yml, -e @file, or -e.
      tags:
        - always

    - name: Wait for SSH (redundant safety)
      ansible.builtin.wait_for_connection:
        timeout: 600
      tags:
        - always

  tasks:
    - name: Run user_setup
      ansible.builtin.include_role:
        name: user_setup
        apply:
          remote_user: "{{ setup_user_setup_remote_user_effective }}"
          tags:
            - user_setup
      when: "'user_setup' in setup_selected_roles"
      tags:
        - user_setup

    - name: Run fave_packages
      ansible.builtin.include_role:
        name: fave_packages
        apply:
          remote_user: "{{ username }}"
          tags:
            - fave_packages
      when: "'fave_packages' in setup_selected_roles"
      tags:
        - fave_packages

    - name: Run nvme_exporter_setup
      ansible.builtin.include_role:
        name: nvme_exporter_setup
        apply:
          remote_user: "{{ username }}"
          tags:
            - nvme_exporter_setup
      when: "'nvme_exporter_setup' in setup_selected_roles"
      tags:
        - nvme_exporter_setup

    - name: Run git_setup
      ansible.builtin.include_role:
        name: git_setup
        apply:
          remote_user: "{{ username }}"
          tags:
            - git_setup
      when: "'git_setup' in setup_selected_roles"
      tags:
        - git_setup

    - name: Run rdma_setup
      ansible.builtin.include_role:
        name: rdma_setup
        apply:
          remote_user: "{{ username }}"
          tags:
            - rdma_setup
      vars:
        rocm_setup_user: "{{ username }}"  # noqa var-naming
      when: "'rdma_setup' in setup_selected_roles"
      tags:
        - rdma_setup

    - name: Run rocm_setup
      ansible.builtin.include_role:
        name: rocm_setup
        apply:
          remote_user: "{{ username }}"
          tags:
            - rocm_setup
      vars:
        rocm_setup_user: "{{ username }}"  # noqa var-naming
      when: "'rocm_setup' in setup_selected_roles"
      tags:
        - rocm_setup

    - name: Run uprof_setup
      ansible.builtin.include_role:
        name: uprof_setup
        apply:
          remote_user: "{{ username }}"
          tags:
            - uprof_setup
      when: "'uprof_setup' in setup_selected_roles"
      tags:
        - uprof_setup

    - name: Run cloud_setup
      ansible.builtin.include_role:
        name: cloud_setup
        apply:
          remote_user: "{{ username }}"
          tags:
            - cloud_setup
      when:
        - "'cloud_setup' in setup_selected_roles"
        - ansible_facts['distribution'] == "Ubuntu"
        - ansible_facts['distribution_release'] in ['noble', 'resolute']
      tags:
        - cloud_setup

    - name: Run consul_setup
      ansible.builtin.include_role:
        name: consul_setup
        apply:
          remote_user: "{{ username }}"
          tags:
            - consul_setup
      when:
        - "'consul_setup' in setup_selected_roles"
        - ansible_facts['distribution'] == "Ubuntu"
        - ansible_facts['distribution_release'] in ['noble', 'resolute']
      tags:
        - consul_setup

    - name: Run aws_grub
      ansible.builtin.include_role:
        name: aws_grub
        apply:
          remote_user: "{{ username }}"
          tags:
            - aws_grub
      when:
        - "'aws_grub' in setup_selected_roles"
        - inventory_hostname in groups.get('awsmachines', [])
      tags:
        - aws_grub

    - name: Run rocm_hipfile_setup
      ansible.builtin.include_role:
        name: rocm_hipfile_setup
        apply:
          remote_user: "{{ username }}"
          tags:
            - rocm_hipfile_setup
      when: "'rocm_hipfile_setup' in setup_selected_roles"
      tags:
        - rocm_hipfile_setup

    - name: Run rocm_xio_setup
      ansible.builtin.include_role:
        name: rocm_xio_setup
        apply:
          remote_user: "{{ username }}"
          tags:
            - rocm_xio_setup
      vars:
        rocm_setup_user: "{{ username }}"  # noqa var-naming
      when: "'rocm_xio_setup' in setup_selected_roles"
      tags:
        - rocm_xio_setup

    - name: Run tmux_scripts
      ansible.builtin.include_role:
        name: tmux_scripts
        apply:
          remote_user: "{{ username }}"
          tags:
            - tmux_scripts
      when: "'tmux_scripts' in setup_selected_roles"
      tags:
        - tmux_scripts

    - name: Run mutt_setup
      ansible.builtin.include_role:
        name: mutt_setup
        apply:
          remote_user: "{{ username }}"
          tags:
            - mutt_setup
      when: "'mutt_setup' in setup_selected_roles"
      tags:
        - mutt_setup

    - name: Run kernel_setup
      ansible.builtin.include_role:
        name: kernel_setup
        apply:
          remote_user: "{{ username }}"
          tags:
            - kernel_setup
      when: "'kernel_setup' in setup_selected_roles"
      tags:
        - kernel_setup

    - name: Run fio_devel
      ansible.builtin.include_role:
        name: fio_devel
        apply:
          remote_user: "{{ username }}"
          tags:
            - fio_devel
      when: "'fio_devel' in setup_selected_roles"
      tags:
        - fio_devel

    - name: Run docker_setup
      ansible.builtin.include_role:
        name: docker_setup
        apply:
          become: true
          tags:
            - docker_setup
      vars:
        docker_setup_users:
          - "{{ username }}"
      when: "'docker_setup' in setup_selected_roles"
      tags:
        - docker_setup

    - name: Run qemu_setup
      ansible.builtin.include_role:
        name: qemu_setup
        apply:
          remote_user: "{{ username }}"
          tags:
            - qemu_setup
      when:
        - "'qemu_setup' in setup_selected_roles"
        - inventory_hostname not in groups.get('localvms', [])
        - inventory_hostname not in groups.get('runners', [])
      tags:
        - qemu_setup

    - name: Run vm_create
      ansible.builtin.include_role:
        name: vm_create
        apply:
          remote_user: "{{ username }}"
          tags:
            - vm_create
      when:
        - "'vm_create' in setup_selected_roles"
        - inventory_hostname not in groups.get('localvms', [])
        - inventory_hostname not in groups.get('runners', [])
      tags:
        - vm_create

    - name: Run nfs_rdma_setup
      ansible.builtin.include_role:
        name: nfs_rdma_setup
        apply:
          remote_user: "{{ username }}"
          tags:
            - nfs_rdma_setup
      when: "'nfs_rdma_setup' in setup_selected_roles"
      tags:
        - nfs_rdma_setup

    - name: Run nvmeof_setup
      ansible.builtin.include_role:
        name: nvmeof_setup
        apply:
          remote_user: "{{ username }}"
          tags:
            - nvmeof_setup
      when: "'nvmeof_setup' in setup_selected_roles"
      tags:
        - nvmeof_setup

    - name: Run aws_ec2_setup
      ansible.builtin.include_role:
        name: aws_ec2_setup
        apply:
          remote_user: "{{ username }}"
          tags:
            - aws_ec2_setup
      when: "'aws_ec2_setup' in setup_selected_roles"
      tags:
        - aws_ec2_setup
