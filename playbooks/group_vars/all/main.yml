---
# Non-secret defaults for setup-aws-rocm-xio.yml (Play 1).
# Override in inventory, group_vars, or with ansible-playbook -e.

# Each subnet lives in one Availability Zone. g4ad is not available in every AZ
# (e.g. often not us-west-2d in Oregon — use us-west-2a/b/c). List subnets + AZ:
#   aws ec2 describe-subnets --region us-west-2 --filters Name=vpc-id,Values=VPCID \
#     --query 'Subnets[*].[SubnetId,AvailabilityZone,CidrBlock]' --output table
aws_ec2_vpc_subnet_id: "subnet-0f73be78"
aws_ec2_key_name: "batesste-20160101"
aws_ec2_security_group_ids:
  - "sg-0c197069"
# Optional; omit when empty
aws_ec2_iam_instance_profile_name: ""
aws_ec2_profile: "raithlin"

# user_setup connects as root_user; remaining roles use username.
root_user: ubuntu
username: stebates

# AWS API / EC2 launch
aws_ec2_region: us-west-2
# Smallest common g4ad SKU with one AMD GPU (override per region/need).
aws_ec2_instance_type: g4ad.xlarge
aws_ec2_root_volume_size: 200
aws_ec2_root_volume_type: gp3
aws_ec2_assign_public_ip: true
# Leave empty to resolve latest Canonical Ubuntu 24.04 noble (no Marketplace opt-in).
# If you pin ami-…, avoid Marketplace-only AMIs unless you accept terms in this account.
aws_ec2_ami_id: ""
aws_ec2_instance_name: aws-rocm-xio
aws_ec2_project_tag: rocm-xio
aws_ec2_owner_tag: "472426151104"
aws_ec2_inventory_host_name: aws-rocm-xio-target

# SSH / accounts on the new instance (Ubuntu cloud images).
aws_ec2_ssh_user: ubuntu
aws_ec2_root_user: ubuntu
# Pin SSH to this public IP or DNS when set (overrides EC2 DNS from Play 1).
# Leave empty "" to use the public DNS / IP returned by the AWS API.
aws_ec2_bootstrap_ansible_host: "35.87.7.89"
# Controller path to the SSH private key matching aws_ec2_key_name (same as ssh -i …).
# Leave empty "" to use ssh-agent / ~/.ssh defaults only.
aws_ec2_ssh_private_key_file: "{{ lookup('env', 'HOME') }}/.aws/batesste-20160101.pmem"

# Host vars mirrored from aws_ec2_setup inventory templates.
expected_gpu_count: 1
expected_nvme_count: 1

# rocm_xio_setup (nvme-ep requires at least one path; override after lsblk on host).
rocm_xio_setup_perf_endpoint: nvme-ep
rocm_xio_setup_gpu_count: 1
# Instance-store NVMe path varies; confirm with lsblk after boot.
rocm_xio_setup_perf_nvme_controllers:
  - /dev/nvme1n1
