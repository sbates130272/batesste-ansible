---
# Hosts in this group are real EC2/bare-metal GPU targets (not CI containers).
# rocm_setup defaults to skipping reboot (CI); amdgpu-dkms needs a reboot before
# rocminfo / ROCk can succeed.
rocm_setup_skip_reboot: false
# Early in rocm_setup, aws_kernel_facts.yml sets rocm_setup_aws_ec2,
# rocm_setup_kernel_release, rocm_setup_kernel_trailing_flavor,
# rocm_setup_kernel_version_abi, rocm_setup_linux_image_package_for_running_kernel,
# and rocm_setup_is_ubuntu_style_aws_surface_kernel for packaging decisions.
#
# EC2 + ROCm: keep amdgpu-dkms and also pull Ubuntu’s extra in-tree modules for
# the AWS kernel (amdgpu and dependencies can be split across packages).
rocm_setup_install_kernel_driver: true
rocm_setup_extra_kernel_packages:
  - linux-modules-extra-aws
#
# If you instead use a pinned linux-image-*-aw only (no DKMS), set
# rocm_setup_install_kernel_driver: false and replace the list above, e.g.:
#   rocm_setup_extra_kernel_packages:
#     - linux-image-6.17.0-1013-aw
