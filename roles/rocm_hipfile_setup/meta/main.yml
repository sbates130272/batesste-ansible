---
galaxy_info:
  author: Stephen Bates
  company: Raithlin Semiconductors
  role_name: rocm_hipfile_setup
  description: >-
    Configure hipFile-enabled fio using hipFile from rocm-systems
  license: Apache-2.0
  min_ansible_version: "2.15.0"
  platforms:
    - name: Ubuntu
      versions:
        - noble
        - resolute
  galaxy_tags:
    - rocm
    - hipfile
    - fio
    - storage

# Tag the dependency so `--tags rocm_hipfile_setup` does not re-run rocm_setup
# (untagged dependencies always execute with the parent role). Playbooks that
# build a full stack should still list rocm_setup before rocm_hipfile_setup.
dependencies:
  - role: rocm_setup
    tags:
      - rocm_setup
