# Build and install hipFile and hipFile-enabled fio from source.

- name: Set a fact containing the current roles' path
  ansible.builtin.set_fact:
    rocm_hipfile_setup_calling_role_path_fact: "{{ role_path }}"

- name: Test the host platform to see if it can support this role
  ansible.builtin.include_role:
    name: sbates130272.batesste.check_platform
  vars:
    calling_role_path: "{{ rocm_hipfile_setup_calling_role_path_fact }}"  # noqa var-naming

- name: Stop role early if installation is disabled
  ansible.builtin.meta: end_host
  when: not rocm_hipfile_setup_install | bool

- name: Ensure build dependencies are installed
  ansible.builtin.package:
    name: "{{ rocm_hipfile_setup_build_packages }}"
    state: present
    update_cache: true
  become: true

- name: Resolve runtime linker path for build and checks
  ansible.builtin.set_fact:
    rocm_hipfile_setup_ld_library_path: >-
      {{ rocm_hipfile_setup_runtime_ld_library_path }}:{{
      ansible_env.LD_LIBRARY_PATH | default('') }}

- name: Verify ROCm setup has already been completed
  ansible.builtin.stat:
    path: "{{ rocm_hipfile_setup_rocm_path }}/bin/hipcc"
  register: rocm_hipfile_setup_hipcc_stat

- name: Stop when ROCm is not available
  ansible.builtin.fail:
    msg: >-
      rocm_setup must run before rocm_hipfile_setup. Missing
      {{ rocm_hipfile_setup_rocm_path }}/bin/hipcc.
  when: not rocm_hipfile_setup_hipcc_stat.stat.exists

- name: Ensure Projects folder exists
  ansible.builtin.file:
    path: "{{ rocm_hipfile_setup_projects_dir }}"
    state: directory
    mode: "0755"

- name: Ensure fio install directory exists
  ansible.builtin.file:
    path: "{{ rocm_hipfile_setup_fio_install_dir }}"
    state: directory
    mode: "0755"
  become: true

- name: Checkout hipFile repository
  ansible.builtin.git:
    repo: "{{ rocm_hipfile_setup_hipfile_repo }}"
    dest: "{{ rocm_hipfile_setup_hipfile_src_dir }}"
    accept_newhostkey: true
    force: "{{ rocm_hipfile_setup_hipfile_force }}"
    version: "{{ rocm_hipfile_setup_hipfile_version }}"
  register: rocm_hipfile_setup_hipfile_clone
  failed_when:
    - rocm_hipfile_setup_hipfile_clone.failed
    - >-
      'Local modifications exist in the destination'
      not in rocm_hipfile_setup_hipfile_clone.msg

- name: Configure hipFile CMake build
  ansible.builtin.command:
    chdir: "{{ rocm_hipfile_setup_hipfile_src_dir }}"
    cmd: >-
      cmake -S . -B "{{ rocm_hipfile_setup_hipfile_build_dir }}"
      -DCMAKE_BUILD_TYPE={{ rocm_hipfile_setup_hipfile_build_type }}
      -DCMAKE_HIP_PLATFORM={{ rocm_hipfile_setup_hip_platform }}
      -DROCM_PATH={{ rocm_hipfile_setup_rocm_path }}
  environment:
    LD_LIBRARY_PATH: "{{ rocm_hipfile_setup_ld_library_path }}"
  register: rocm_hipfile_setup_hipfile_configure
  changed_when: false

- name: Build hipFile
  ansible.builtin.command:
    chdir: "{{ rocm_hipfile_setup_hipfile_src_dir }}"
    cmd: >-
      cmake --build "{{ rocm_hipfile_setup_hipfile_build_dir }}"
      --parallel {{ rocm_hipfile_setup_parallel_jobs }}
  environment:
    LD_LIBRARY_PATH: "{{ rocm_hipfile_setup_ld_library_path }}"
  register: rocm_hipfile_setup_hipfile_build
  changed_when: false

- name: Install hipFile into ROCm path
  ansible.builtin.command:
    chdir: "{{ rocm_hipfile_setup_hipfile_src_dir }}"
    cmd: cmake --install "{{ rocm_hipfile_setup_hipfile_build_dir }}"
  environment:
    LD_LIBRARY_PATH: "{{ rocm_hipfile_setup_ld_library_path }}"
  become: true
  changed_when: false

- name: Checkout ROCm fio hipFile branch
  ansible.builtin.git:
    repo: "{{ rocm_hipfile_setup_fio_repo }}"
    dest: "{{ rocm_hipfile_setup_fio_src_dir }}"
    accept_newhostkey: true
    force: "{{ rocm_hipfile_setup_fio_force }}"
    version: "{{ rocm_hipfile_setup_fio_version }}"
  register: rocm_hipfile_setup_fio_clone
  failed_when:
    - rocm_hipfile_setup_fio_clone.failed
    - >-
      'Local modifications exist in the destination'
      not in rocm_hipfile_setup_fio_clone.msg

- name: Configure ROCm fio with libhipfile engine enabled
  ansible.builtin.command:
    chdir: "{{ rocm_hipfile_setup_fio_src_dir }}"
    cmd: >-
      ./configure --prefix="{{ rocm_hipfile_setup_fio_install_dir }}"
      --enable-libhipfile
      --extra-cflags="{{ rocm_hipfile_setup_fio_extra_cflags }}"
      --extra-ldflags="{{ rocm_hipfile_setup_fio_extra_ldflags }}"
  environment:
    LD_LIBRARY_PATH: "{{ rocm_hipfile_setup_ld_library_path }}"
    PKG_CONFIG_PATH: >-
      {{ rocm_hipfile_setup_rocm_path }}/lib/pkgconfig:{{
      rocm_hipfile_setup_rocm_path }}/lib64/pkgconfig:{{
      ansible_env.PKG_CONFIG_PATH | default('') }}
    PATH: "{{ rocm_hipfile_setup_rocm_path }}/bin:{{ ansible_env.PATH }}"
  changed_when: false

- name: Build ROCm fio
  ansible.builtin.command:
    chdir: "{{ rocm_hipfile_setup_fio_src_dir }}"
    cmd: make -j {{ rocm_hipfile_setup_parallel_jobs }}
  environment:
    LD_LIBRARY_PATH: "{{ rocm_hipfile_setup_ld_library_path }}"
  changed_when: false

- name: Install ROCm fio
  ansible.builtin.command:
    chdir: "{{ rocm_hipfile_setup_fio_src_dir }}"
    cmd: make install
  become: true
  environment:
    LD_LIBRARY_PATH: "{{ rocm_hipfile_setup_ld_library_path }}"
  changed_when: false

- name: Check hipFile install with ais-check
  ansible.builtin.command:
    cmd: "{{ rocm_hipfile_setup_rocm_path }}/bin/ais-check"
  environment:
    LD_LIBRARY_PATH: "{{ rocm_hipfile_setup_ld_library_path }}"
  register: rocm_hipfile_setup_ais_check
  changed_when: false
  failed_when: false
  when: rocm_hipfile_setup_run_checks | bool

- name: Check fio has libhipfile engine
  ansible.builtin.command:
    cmd: "{{ rocm_hipfile_setup_fio_install_dir }}/bin/fio --enghelp=libhipfile"
  environment:
    LD_LIBRARY_PATH: "{{ rocm_hipfile_setup_ld_library_path }}"
  register: rocm_hipfile_setup_fio_engine_check
  changed_when: false
  failed_when: false
  when: rocm_hipfile_setup_run_checks | bool

- name: Show hipFile setup verification output
  ansible.builtin.debug:
    msg:
      - "ais-check rc={{ rocm_hipfile_setup_ais_check.rc | default('skipped') }}"
      - "fio libhipfile check rc={{ rocm_hipfile_setup_fio_engine_check.rc | default('skipped') }}"
  when: rocm_hipfile_setup_run_checks | bool
