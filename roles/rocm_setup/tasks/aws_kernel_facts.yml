---
# Set facts for AWS EC2 detection and running kernel shape (Ubuntu-style uname -r).
# Use in group_vars / -e to choose linux-image-*-aw vs amdgpu-dkms.

- name: Read DMI board_vendor for AWS EC2 detection
  ansible.builtin.slurp:
    src: /sys/devices/virtual/dmi/id/board_vendor
  register: rocm_setup_dmi_board_vendor
  failed_when: false
  changed_when: false

- name: Read DMI sys_vendor for AWS EC2 detection
  ansible.builtin.slurp:
    src: /sys/devices/virtual/dmi/id/sys_vendor
  register: rocm_setup_dmi_sys_vendor
  failed_when: false
  changed_when: false

- name: Read hypervisor UUID (legacy Xen EC2)
  ansible.builtin.slurp:
    src: /sys/hypervisor/uuid
  register: rocm_setup_hypervisor_uuid
  failed_when: false
  changed_when: false

- name: Set AWS EC2 and kernel facts for ROCm packaging
  ansible.builtin.set_fact:
    rocm_setup_aws_ec2: >-
      {{
        (ansible_system_vendor | default('', true) | lower is search('amazon'))
        or (ansible_chassis_asset_tag | default('', true) | lower is search('amazon'))
        or (
          (not rocm_setup_dmi_board_vendor.failed)
          and (rocm_setup_dmi_board_vendor.content | b64decode | trim | lower == 'amazon ec2')
        )
        or (
          (not rocm_setup_dmi_sys_vendor.failed)
          and (rocm_setup_dmi_sys_vendor.content | b64decode | trim | lower == 'amazon ec2')
        )
        or (
          (not rocm_setup_hypervisor_uuid.failed)
          and ((rocm_setup_hypervisor_uuid.content | b64decode | trim | lower).startswith('ec2'))
        )
      }}
    rocm_setup_kernel_release: "{{ ansible_kernel }}"
    rocm_setup_kernel_trailing_flavor: "{{ ansible_kernel.split('-')[-1] }}"
    rocm_setup_kernel_version_abi: "{{ ansible_kernel.rsplit('-', 1)[0] }}"
    rocm_setup_linux_image_package_for_running_kernel: "linux-image-{{ ansible_kernel }}"
    rocm_setup_is_ubuntu_style_aws_surface_kernel: >-
      {{ ansible_kernel.split('-')[-1] in ['aws', 'aw'] }}
