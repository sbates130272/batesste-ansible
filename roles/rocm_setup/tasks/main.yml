#
# AMD ROCm software install and setup.

- name: Set a fact containing the current roles' path
  ansible.builtin.set_fact:
    calling_role_path_fact: "{{ role_path }}"

- name: Test the host platform to see if it can support this role
  ansible.builtin.include_role:
    name: check_platform
  vars:
    calling_role_path: "{{ calling_role_path_fact }}"

- name: Add the AMD ROCm apt siging key and repo
  ansible.builtin.deb822_repository:
    name: rocm
    types: deb
    uris:
      - https://repo.radeon.com/rocm/apt/{{ rocm_setup_version }}
    suites: '{{ ansible_distribution_release }}'
    components: main
    architectures: amd64
    signed_by: https://repo.radeon.com/rocm/rocm.gpg.key

- name: Add the AMD  apt siging key and repo
  ansible.builtin.deb822_repository:
    name: amdgpu
    types: deb
    uris:
      - https://repo.radeon.com/amdgpu/{{ rocm_setup_version }}/ubuntu
    suites: '{{ ansible_distribution_release }}'
    components: main
    architectures:
      - i386
      - amd64
    signed_by: https://repo.radeon.com/rocm/rocm.gpg.key



- name: Copy over the apt priority/pin file for the ROCm repository
  ansible.builtin.copy:
    src: rocm-pin-600
    dest: /etc/apt/preferences.d/rocm-pin-600
    owner: root
    group: root
    mode: '0644'

- name: Install the prerequisite packages needed for ROCm install
  ansible.builtin.package:
    update_cache: true
    name:
      - linux-headers-{{ ansible_kernel }}
      - linux-modules-extra-{{ ansible_kernel }}
      - python3-setuptools
      - python3-wheel

- name: Install the amdgpu-dkms and rocm packages
  ansible.builtin.package:
    update_cache: true
    name:
      - amdgpu-dkms

- name: Ensure existance of group for AMD GPUs
  ansible.builtin.group:
    name: "{{ rocm_setup_amdgpu_group }}"
    state: present

- name: Ensures /etc/udev/rules.d directory exists
  ansible.builtin.file:
    path: /etc/udev/rules.d
    state: directory

- name: Copy over the udev rules file using a template
  ansible.builtin.template:
    src: 70-amdgpu.rules.j2
    dest: /etc/udev/rules.d/70-amdgpu.rules
    owner: root
    group: root
    mode: '0644'
