---
# defaults file for rocm-setup

# The version of ROCm to install. Set to latest to use rocm-latest
# script to detect latest.
rocm_setup_rocm_version: latest
rocm_setup_amdgpu_version: latest
rocm_setup_graphics_version: latest

# Map ROCm versions to package names when the meta package changes.
rocm_setup_versioned_package_map:
  "7.2": rocm7.2.0

# Single file for ROCm APT sources (deb822 format).
rocm_setup_sources_file: /etc/apt/sources.list.d/rocm.sources

# The user to set ROCm up for. This includes adding to the relevant
# user groups etc.
rocm_setup_user: rocm_user

# The reboot time to wait for. Note we can set this a lot less for a
# VM than for a bare-metal
rocm_setup_reboot_timeout: 300

# Skip reboot steps (useful for CI, containers, or manual control).
rocm_setup_skip_reboot: true

# Skip apt safe-upgrade/autoremove system update pass in rocm_pre.
# Useful in CI where full distro upgrades can be slow and noisy.
rocm_setup_skip_system_upgrade: false

# Install kernel-facing AMDGPU pieces (headers, modules, amdgpu-dkms).
# Disable in CI where no GPU/kernel-driver validation is possible, or on AWS
# when using a vendor kernel image that already ships AMDGPU (see
# rocm_setup_extra_kernel_packages).
rocm_setup_install_kernel_driver: true

# Optional extra kernel image / module metapackages (installed before amdgpu-dkms).
# Example on Ubuntu EC2 with DKMS: linux-modules-extra-aws; without DKMS, a pinned
# linux-image-*-aw only.
rocm_setup_extra_kernel_packages: []

# WSL install mode: false (Linux), legacy (roc4wsl), or rocdxg (librocdxg).
rocm_setup_wsl: false

# Deprecated: true maps to legacy when rocm_setup_wsl is false.
rocm_setup_wsl_install: false

# ROCDXG (rocm_setup_wsl: rocdxg) settings.
rocm_setup_wsl_librocdxg_repo: https://github.com/ROCm/librocdxg.git
rocm_setup_wsl_librocdxg_version: develop
rocm_setup_wsl_librocdxg_src_dir: /usr/local/src/librocdxg
rocm_setup_wsl_win_sdk_path: ""
rocm_setup_wsl_install_win_sdk: true
rocm_setup_wsl_win_sdk_winget_id: Microsoft.WindowsSDK.10.0.26100
rocm_setup_wsl_hsa_enable_dxg_detection: true
rocm_setup_wsl_hsa_override_gfx_version: ""
rocm_setup_wsl_librocdxg_force: false

# Run rocminfo when rocm_setup_run_checks is true (skipped for legacy WSL).
# For rocdxg, optionally compile and run the HIP hello-world test too.
rocm_setup_wsl_run_hip_check: true

# Run ROCm checks (rocminfo and HIP compilation)
# Set to false in CI or when no AMD GPUs are present
rocm_setup_run_checks: true

# xrocmtop - btop-style terminal UI for AMD ROCm and Vulkan GPU monitoring
# https://github.com/argakiig/xrocmtop
# Install by default; set to false to skip.
rocm_setup_install_xrocmtop: true
rocm_setup_xrocmtop_version: latest
rocm_setup_xrocmtop_install_dir: /usr/local/bin

# AMD Device Metrics Exporter configuration
# Install and configure AMD Device Metrics Exporter for Prometheus metrics
# https://github.com/ROCm/device-metrics-exporter
rocm_setup_install_metrics_exporter: true
rocm_setup_metrics_exporter_version: latest
rocm_setup_metrics_exporter_repo_uri: >-
  https://repo.radeon.com/device-metrics-exporter/apt/{{
  rocm_setup_metrics_exporter_version }}
rocm_setup_metrics_exporter_port: 5000
rocm_setup_metrics_exporter_config_path: /etc/metrics/config.json
rocm_setup_metrics_exporter_open_firewall: true
