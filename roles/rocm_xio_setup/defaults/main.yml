# Build source location for ROCm XIO.
rocm_xio_setup_repo_url: "https://github.com/ROCm/rocm-xio.git"
rocm_xio_setup_repo_version: "v0.1.0"
rocm_xio_setup_source_dir: "{{ ansible_env.HOME }}/Projects/rocm-xio"
rocm_xio_setup_force_clone: false

# Build and install controls.
rocm_xio_setup_install_dependencies: true
rocm_xio_setup_remove_distro_hsa_runtime_dev: true
rocm_xio_setup_build_type: "Release"
rocm_xio_setup_build_clients: true
rocm_xio_setup_build_testing: true
rocm_xio_setup_offload_arch: ""
rocm_xio_setup_install: false
rocm_xio_setup_install_prefix: "/opt/rocm"
rocm_xio_setup_parallel_jobs: "{{ ansible_processor_vcpus | default(4) }}"

# Run install validation checks after build.
rocm_xio_setup_run_basic_checks: true
rocm_xio_setup_check_rocminfo: true
rocm_xio_setup_run_unit_tests: true
rocm_xio_setup_run_test_endpoint: true
rocm_xio_setup_test_endpoint_emulate: true

# Hardware performance runs are opt-in because NVMe endpoint tests issue I/O to
# the configured block device.
# Supported endpoints: rdma-ep, nvme-ep
rocm_xio_setup_run_perf_tests: false
rocm_xio_setup_perf_endpoint: "nvme-ep"
rocm_xio_setup_perf_provider: "bnxt"
rocm_xio_setup_perf_rdma_device: ""
rocm_xio_setup_perf_iterations: 128
rocm_xio_setup_perf_transfer_size: 4096
# Baseline target is one GPU. Set NVMe controllers explicitly for perf tests.
rocm_xio_setup_gpu_count: 1
rocm_xio_setup_perf_nvme_controllers: []
rocm_xio_setup_perf_read_io: 128
# Optional: pass --batch-size when using an xio-tester build that supports it.
rocm_xio_setup_perf_batch_size: ""
rocm_xio_setup_perf_extra_args: ""

# Use HSA_FORCE_FINE_GRAIN_PCIE=1 in endpoint checks and perf tests.
rocm_xio_setup_force_fine_grain_pcie: true

# Persist environment variables even when used by sudo.
rocm_xio_setup_env_nvme_device: >-
  {{ (rocm_xio_setup_perf_nvme_controllers | first)
     if (rocm_xio_setup_perf_nvme_controllers | length > 0)
     else '' }}
rocm_xio_setup_env_profile_path: "/etc/profile.d/rocm-xio.sh"
rocm_xio_setup_env_sudoers_path: "/etc/sudoers.d/rocm-xio"

# Optional: persist TMPDIR system-wide (and across sudo) to write to emulated NVMe
rocm_xio_setup_env_tmpdir: ""

# Build, install, and load the rocm-xio kernel module from kernel/rocm-xio.
rocm_xio_setup_install_kmod: true
rocm_xio_setup_kmod_dir: "{{ rocm_xio_setup_source_dir }}/kernel/rocm-xio"
