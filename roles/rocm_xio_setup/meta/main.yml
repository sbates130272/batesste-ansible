---
galaxy_info:
  author: Stephen Bates
  company: Raithlin Semiconductors
  role_name: rocm_xio_setup
  description: >-
    Build and validate ROCm XIO for GPU-initiated IO workflows
  license: Apache-2.0
  min_ansible_version: "2.15.0"
  platforms:
    - name: Ubuntu
      versions:
        - noble
        - resolute
  galaxy_tags:
    - rocm
    - gpu
    - io
    - rdma
    - nvme

# Tag the dependency so `--tags rocm_xio_setup` does not re-run rocm_setup
# (untagged dependencies always execute with the parent role). Playbooks that
# only install XIO should list rocm_setup earlier when a full stack is needed.
dependencies:
  - role: rocm_setup
    tags:
      - rocm_setup
