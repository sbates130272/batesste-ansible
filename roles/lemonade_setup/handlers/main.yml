- name: Run lemonade setup script
  ansible.builtin.command:
    cmd: ./setup.sh
    chdir: "{{ lemonade_setup_source_dir }}"
  changed_when: true
  become: true

- name: Build lemonade from source
  ansible.builtin.command:
    cmd: cmake --build --preset default
    chdir: "{{ lemonade_setup_source_dir }}"
  changed_when: true

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true
  become: true

- name: Restart lemonade-server
  ansible.builtin.systemd:
    name: lemonade-server
    state: restarted
    enabled: true
  become: true

- name: Restart lemonade-preload
  ansible.builtin.systemd:
    name: lemonade-preload
    state: restarted
    enabled: true
  become: true
  when: lemonade_setup_preload_enabled

- name: Restart lemonade-exporter
  ansible.builtin.systemd:
    name: lemonade-exporter
    state: restarted
    enabled: true
  become: true
  when: lemonade_setup_exporter_enabled
