---
# Discover RDMA-capable interfaces and their IPv4 addresses on this host.
# Sets nfs_rdma_rdma_interfaces: [{ name: "ib0", address: "192.168.2.2" }, ...]

- name: Get RDMA link netdev names
  ansible.builtin.shell: |
    set -o pipefail
    rdma link show 2>/dev/null | awk '{print $8}' | sort -u
  args:
    executable: /bin/bash
  register: nfs_rdma_link_out
  changed_when: false
  failed_when: false

- name: Initialize RDMA interfaces list
  ansible.builtin.set_fact:
    nfs_rdma_rdma_interfaces: []
  when: (nfs_rdma_link_out.stdout_lines | default([]) | length) > 0

- name: Build RDMA interfaces list with IPv4
  ansible.builtin.set_fact:
    nfs_rdma_rdma_interfaces: "{{
      nfs_rdma_rdma_interfaces + [{'name': item, 'address': nfs_rdma_iface_ipv4}]
    }}"
  loop: "{{ nfs_rdma_link_out.stdout_lines | default([]) | map('trim') | select() | unique | list }}"
  when:
    - (nfs_rdma_link_out.stdout_lines | default([]) | length) > 0
    - nfs_rdma_iface_fact.ipv4 is defined
    - nfs_rdma_iface_ipv4 | length > 0
  vars:
    nfs_rdma_iface_fact: "{{
      hostvars[inventory_hostname]['ansible_' ~ item] | default({})
    }}"
    nfs_rdma_iface_ipv4: "{{
      nfs_rdma_iface_fact.ipv4.address
      | default(nfs_rdma_iface_fact.ipv4[0].address | default(''))
    }}"
