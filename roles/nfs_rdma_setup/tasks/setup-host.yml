---
# NFS client: packages, rpcrdma, mount over RDMA

- name: Require NFS server address for host mode
  ansible.builtin.assert:
    that:
      - nfs_rdma_setup_nfs_server_resolved | default('') | length > 0
    fail_msg: >-
      Set nfs_rdma_setup_nfs_server to the server IPv4 address, or set
      nfs_rdma_setup_target_host to the inventory hostname of the NFS server.
  when: nfs_rdma_setup_mode == 'host'

- name: Install NFS client and RDMA packages
  ansible.builtin.package:
    name: "{{ nfs_rdma_setup_client_packages }}"
    state: present
    update_cache: true
  become: true

- name: Install optional diagnostics tools
  ansible.builtin.package:
    name:
      - ibverbs-utils
      - infiniband-diags
    state: present
    update_cache: true
  become: true
  when: nfs_rdma_setup_install_tools | bool

- name: Load rpcrdma module on client
  community.general.modprobe:
    name: rpcrdma
    persistent: false
  become: true
  when: nfs_rdma_setup_enable_rdma | bool

- name: Ensure mount point exists
  ansible.builtin.file:
    path: "{{ nfs_rdma_setup_mount_path }}"
    state: directory
    mode: "0755"
  become: true

- name: Mount NFS export over RDMA
  ansible.posix.mount:
    path: "{{ nfs_rdma_setup_mount_path }}"
    src: "{{ nfs_rdma_setup_nfs_server_resolved }}:{{ nfs_rdma_setup_export_path }}"
    fstype: nfs
    opts: "{{ nfs_rdma_setup_mount_options }}"
    state: "{{ 'mounted' if (nfs_rdma_setup_mount_auto | bool) else 'present' }}"
    passno: "{{ nfs_rdma_setup_mount_passno }}"
  become: true
  when: nfs_rdma_setup_nfs_server_resolved | length > 0
