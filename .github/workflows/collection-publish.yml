---
name: Collection Build and Publish

"on":
  workflow_dispatch: {}
  pull_request:
    branches:
      - main
    paths:
      - galaxy.yml
      - roles/**
  push:
    tags:
      - "v*"

jobs:
  sanity:
    name: Sanity tests
    strategy:
      fail-fast: false
      matrix:
        runs-on:
          - ubuntu-24.04
          - ubuntu-26.04
        python-version:
          - "3.12"
    runs-on: ${{ matrix.runs-on }}
    continue-on-error: ${{ matrix.runs-on == 'ubuntu-26.04' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          path: >-
            ansible_collections/sbates130272/batesste

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install ansible-core
        run: python3 -m pip install ansible-core

      - name: Run sanity tests
        working-directory: >-
          ansible_collections/sbates130272/batesste
        run: >-
          ansible-test sanity
          --python ${{ matrix.python-version }}
          -v

  build:
    name: Build collection artifact
    needs: sanity
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Install pip packages
        run: python3 -m pip install -r requirements.txt

      - name: Build the collection
        run: ansible-galaxy collection build --force

      - name: Upload collection artifact
        uses: actions/upload-artifact@v4
        with:
          name: collection-artifact
          path: "*.tar.gz"
          retention-days: 7

  publish:
    name: Publish to Ansible Galaxy
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Install pip packages
        run: python3 -m pip install -r requirements.txt

      - name: Download collection artifact
        uses: actions/download-artifact@v4
        with:
          name: collection-artifact

      - name: Publish to Galaxy
        run: >-
          ansible-galaxy collection publish
          --api-key "${{ secrets.GALAXY_API_KEY }}"
          *.tar.gz
