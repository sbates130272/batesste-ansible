---
ancestor: null
releases:
  1.5.0:
    release_date: "2026-06-05"
    changes:
      release_summary: >-
        Auto-install the local collection from
        playbooks/run-ansible and fix AMD uProf CLI
        discovery after .deb install.
      minor_changes:
        - >-
          playbooks/run-ansible — auto-install the local
          sbates130272.batesste collection when missing.
          Set FORCE_LOCAL=1 to rebuild and reinstall from
          the checkout before each run.
      bugfixes:
        - >-
          uprof_setup — resolve AMDuProfCLI from the
          amduprof package under /opt/AMDuProf_* and add
          a symbolic link in /usr/local/bin; the .deb
          does not add the CLI to PATH.
  1.0.0:
    release_date: "2026-03-19"
    changes:
      release_summary: >-
        Initial release of the batesste Ansible
        collection. All roles previously published as
        standalone roles are now bundled into a single
        collection. The geerlingguy.docker and
        mrlesmithjr.netplan dependencies have been
        inlined.
      major_changes:
        - >-
          Published 20 roles as the
          ``sbates130272.batesste`` collection.
        - >-
          Added ``docker_setup`` role replacing the
          standalone ``geerlingguy.docker`` role.
        - >-
          Inlined netplan bridge configuration into
          ``qemu_setup``, removing the
          ``mrlesmithjr.netplan`` dependency.
        - >-
          Standardised all role metadata to use
          Apache-2.0 license.
        - >-
          All inter-role references now use fully
          qualified collection names (FQCN).
